<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Voz de los Espíritus= Evidencias | Brenda Médium y coach espíritual</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --negro-absoluto: #030303;
            --rojo-evidencia: #b10000;
            --blanco-humo: #f0f0f0;
            --gris-metal: #151515;
            --verde-wa: #1ebea5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--negro-absoluto);
            color: var(--blanco-humo);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(to bottom, #1a0000 0%, var(--negro-absoluto) 100%);
        }

        .page-title {
            font-size: clamp(0.9rem, 4vw, 1.6rem);
            color: var(--blanco-humo);
            text-transform: uppercase;
            letter-spacing: 2px;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 10px 15px;
            border-radius: 4px;
            border: 1px solid var(--rojo-evidencia);
            position: absolute;
            top: 30px;
            z-index: 10;
            text-align: center;
        }

        .symbol-equal { color: var(--rojo-evidencia); margin: 0 3px; }

        .profile-image {
            width: 100%;
            max-width: 450px;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(177, 0, 0, 0.3);
            border: 1px solid var(--gris-metal);
            margin-top: 15px;
            z-index: 1;
        }

        .player-card {
            width: 90%;
            max-width: 500px;
            background: var(--gris-metal);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            text-align: center;
            margin-top: -40px;
            position: relative;
            z-index: 5;
            border: 1px solid #222;
        }

        .status-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            color: var(--rojo-evidencia);
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .pulse-dot {
            height: 10px;
            width: 10px;
            background-color: var(--rojo-evidencia);
            border-radius: 50%;
            animation: pulse-red 1.5s infinite;
        }

        @keyframes pulse-red {
            0% { transform: scale(1); opacity: 1; }
            70% { transform: scale(1.4); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        audio {
            width: 100%;
            margin-bottom: 25px;
            filter: invert(1) brightness(1.5);
        }

        .actions { display: flex; flex-direction: column; gap: 12px; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            padding: 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s ease;
        }

        .btn-whatsapp {
            background-color: var(--verde-wa);
            color: white;
        }

        .btn-whatsapp:hover {
            background-color: #17a58e;
            transform: translateY(-2px);
        }

        .btn-radio-direct {
            background-color: #444;
            color: white;
            border: 1px solid #666;
            font-size: 0.75rem;
        }

        .btn-coffee {
            background-color: transparent;
            color: var(--blanco-humo);
            border: 1px solid var(--rojo-evidencia);
        }

        .btn-coffee:hover {
            background-color: var(--rojo-evidencia);
            box-shadow: 0 0 20px rgba(177, 0, 0, 0.5);
            transform: translateY(-2px);
        }

        footer {
            margin-top: auto;
            padding: 40px;
            text-align: center;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @media (max-width: 480px) {
            .page-title { top: 15px; width: 85%; }
            .player-card { padding: 25px 15px; }
        }
    </style>
</head>
<body>

        <img src="brenda-radio-2.png" alt="Brenda Médium y Coach Espiritual" class="profile-image">

        </div>
        
        <div class="reproductor-seccion">
            <h2 style="margin-bottom: 15px; font-size: 1rem;">Escucha En Vivo</h2>
            <audio controls>
                <source src="http://82.145.41.50:3341/;" type="audio/mpeg">
                <source src="https://uk7freenew.listen2myradio.com:3341/;" type="audio/mpeg">
                Tu navegador no soporta el audio.
            </audio>
        </div>

        <div class="actions">
            <a href="http://lavoz23.radio12345.com" target="_blank" class="btn btn-radio-direct">
                <i class="fas fa-external-link-alt"></i> Haz Clic aquí
            </a>

            <a href="https://wa.me/+50686382310" target="_blank" class="btn btn-whatsapp">

            </a>

            <a href="https://buymeacoffee.com/lavozdelosespiritus" target="_blank" class="btn btn-coffee">

    </main>

    <footer>

</html>
